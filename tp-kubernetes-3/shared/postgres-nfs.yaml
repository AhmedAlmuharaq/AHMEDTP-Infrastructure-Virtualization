apiVersion: v1
kind: Namespace
metadata:
  name: shared-persist

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-nfs-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.56.100
    path: /srv/nfs/k8s-postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-nfs-pvc
  namespace: shared-persist
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: shared-persist
type: Opaque
stringData:
  POSTGRES_PASSWORD: admin123
  POSTGRES_USER: admin
  POSTGRES_DB: testdb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-nfs
  namespace: shared-persist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-nfs
  template:
    metadata:
      labels:
        app: postgres-nfs
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-nfs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-nfs
  namespace: shared-persist
spec:
  selector:
    app: postgres-nfs
  ports:
    - port: 5432
      targetPort: 5432
