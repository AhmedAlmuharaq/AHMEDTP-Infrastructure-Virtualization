apiVersion: v1
kind: Namespace
metadata:
  name: local-persist

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-local-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/postgres-local

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-local-pvc
  namespace: local-persist
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: local-persist
type: Opaque
stringData:
  POSTGRES_PASSWORD: admin123
  POSTGRES_USER: admin
  POSTGRES_DB: testdb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-local
  namespace: local-persist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-local
  template:
    metadata:
      labels:
        app: postgres-local
    spec:
      nodeSelector:
        kubernetes.io/hostname: wrk1
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-local-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-local
  namespace: local-persist
spec:
  selector:
    app: postgres-local
  ports:
    - port: 5432
      targetPort: 5432
